{% extends "base.html" %}

{% block content %}
  <h1>Movies</h1>

  <ul>
    {% for movie in movies %}
      <li>{{ movie.title }} - {{ movie.release_year }}</li>
    {% endfor %}
  </ul>

  <form method="POST" action="/movies">
      <input type="text" name="title" placeholder="Title" /><br />
      <input type="number" name="release_year" placeholder="Release year" /><br />
      <input type="submit" value="Submit" />
  </form>
{% endblock %}
